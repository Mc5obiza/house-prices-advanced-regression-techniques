services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: house-pricing-backend
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: house-pricing-frontend
    depends_on:
      - backend
    environment:
      API_BASE_URL: http://backend:8000
    ports:
      - "8501:8501"
    restart: unless-stopped
